name: Deploy

# Auto-deploys to AWS on every push to main (after typecheck + tests pass).
# Keyless: authenticates to AWS via GitHub OIDC, assuming the role in the
# repo variable AWS_DEPLOY_ROLE_ARN. Secrets are read from SSM at deploy time,
# so NO AWS keys or bot tokens are stored in GitHub.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      STACK: narayan-bhakt-bot
      SAM_BUCKET: narayan-bhakt-bot-sam-596596146505
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck + test (gate the deploy)
        run: |
          pnpm run typecheck
          pnpm test

      - name: Build Lambda bundles
        run: |
          pnpm --filter @workspace/telegram-lambda run build
          pnpm --filter @workspace/vms-webhook-lambda run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name "$STACK" \
            --s3-bucket "$SAM_BUCKET" \
            --s3-prefix "$STACK" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM

      - name: Sync Telegram webhook (token from SSM)
        run: |
          TOKEN=$(aws ssm get-parameter --name /bot/telegram-bot-token --with-decryption --query Parameter.Value --output text)
          SECRET=$(aws ssm get-parameter --name /bot/telegram-webhook-secret --with-decryption --query Parameter.Value --output text)
          URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='TelegramWebhookUrl'].OutputValue" --output text)
          echo "Pointing Telegram webhook at $URL"
          curl -fsS "https://api.telegram.org/bot$TOKEN/setWebhook" \
            -d "url=$URL" -d "secret_token=$SECRET" -d "drop_pending_updates=true" >/dev/null
          echo "Webhook synced."
